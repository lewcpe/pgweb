name: CI Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_push_app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=$(echo ${GITHUB_SHA::7})" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pgweb:latest
            ghcr.io/${{ github.repository_owner }}/pgweb:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,images=false

  lint_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run backend lint
        run: cd backend && go vet ./...

  test_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Start postgres for tests
        run: docker compose -f compose.test.yml up -d postgres

      - name: Wait for postgres
        run: sleep 5

      - name: Run backend tests
        env:
          PG_ADMIN_DSN: "postgres://test_admin:test_password@localhost:5432/test_admin_db?sslmode=disable"
          PG_HOST: "localhost"
        run: |
          docker compose -f compose.test.yml run --rm backend-tests

  lint_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run lint
        run: cd frontend && npm run lint

  build_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

  test_playwright:
    needs: build_and_push_app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Set APP_IMAGE for PR
        if: github.event_name == 'pull_request'
        run: |
          echo "APP_IMAGE=pull_request" >> $GITHUB_ENV
          echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Set APP_IMAGE for push
        if: github.event_name == 'push'
        run: |
          echo "APP_IMAGE=ghcr.io/${{ github.repository_owner }}/pgweb" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Pull image for PR
        if: github.event_name == 'pull_request'
        run: docker pull ghcr.io/${{ github.repository_owner }}/pgweb:latest || true

      - name: Build app image
        run: docker compose -f compose.test.yml build app

      - name: Run Playwright e2e tests
        env:
          CYPRESS_BASE_URL: "http://app:8080"
        run: docker compose -f compose.test.yml run --rm playwright-tests

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "===== app logs ====="
          docker compose -f compose.test.yml logs app || true
          echo "===== postgres logs ====="
          docker compose -f compose.test.yml logs postgres || true
          echo "===== ps ====="
          docker compose -f compose.test.yml ps || true
          echo "===== app inspect ====="
          docker inspect pgweb_test_app --format '{{json .State}}' || true