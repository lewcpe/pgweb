services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pgweb_postgres
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: admin_db
    ports:
      - "5432:5432"
    volumes:
      - pgweb_data:/var/lib/postgresql/data
    restart: unless-stopped

  dex:
    image: ghcr.io/dexidp/dex:latest-distroless
    container_name: pgweb_dex
    ports:
      - "5556:5556"
      - "5557:5557"
      - "5558:5558"
    volumes:
      - ./dex_config.yml:/etc/dex/config.docker.yaml:ro
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pgweb_app
    ports:
      - "8080:8080"
    environment:
      PG_ADMIN_DSN: ${PG_ADMIN_DSN:-postgres://admin_user:admin_password@postgres:5432/admin_db?sslmode=disable}
      APP_DB_DSN: ${APP_DB_DSN:-postgres://admin_user:admin_password@postgres:5432/admin_db?sslmode=disable}
      PGWEB_TRUSTED_HEADER: ${PGWEB_TRUSTED_HEADER:-X-Forwarded-Email}
      GIN_MODE: ${GIN_MODE:-debug}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?SESSION_SECRET_KEY is required - see .env.example}
      FRONTEND_DIST: "/app/frontend/dist"
      BACKUP_DIR: ${BACKUP_DIR:-/tmp/pgweb-backups}
    depends_on:
      - postgres
      - dex
    restart: unless-stopped

volumes:
  pgweb_data: