services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pgweb_test_postgres
    environment:
      POSTGRES_USER: test_admin
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_admin_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_admin -d test_admin_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-pgweb-test}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pgweb_test_app
    environment:
      PG_ADMIN_DSN: "postgres://test_admin:test_password@postgres:5432/test_admin_db?sslmode=disable"
      APP_DB_DSN: "postgres://test_admin:test_password@postgres:5432/test_admin_db?sslmode=disable"
      GIN_MODE: "release"
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-test-session-secret}
      PGWEB_TRUSTED_HEADER: "X-Forwarded-Email"
      FRONTEND_DIST: "/app/frontend/dist"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend-tests:
    profiles:
      - backend-tests
    container_name: pgweb_test_backend_tests
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      PG_ADMIN_DSN: "postgres://test_admin:test_password@postgres:5432/test_admin_db?sslmode=disable"
      PG_HOST: "postgres"
    depends_on:
      postgres:
        condition: service_healthy

  playwright-tests:
    profiles:
      - e2e-tests
    container_name: pgweb_test_playwright
    build:
      context: .
      dockerfile: Dockerfile.playwright
    environment:
      CYPRESS_BASE_URL: "http://app:8080"
      PG_HOST: "postgres"
    depends_on:
      app:
        condition: service_healthy
    network_mode: service:app
    volumes:
      - ./tests/playwright:/e2e/tests/playwright
      - ./frontend:/e2e/frontend